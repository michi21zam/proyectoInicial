<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crud Clientes</title>
    <link rel="stylesheet" href="../estilos/crud_usuario.css" />
  </head>

  <body>
    <div>
      <a href="../index.html" class="home-button"
        >Regresar a la página de inicio</a
      >
    </div>
    <hr />
    <div class="container">
      <div class="column form-column">
        <h2>Agregar Cliente</h2>
        <input
          type="text"
          id="nombre"
          class="form-input"
          placeholder="nombre"
        />
        <input
          type="text"
          id="direccion"
          class="form-input"
          placeholder="direccion"
        />
        <button id="btnAgregar" class="btn btn-agregar">Agregar</button>
      </div>
      <div class="column select-column">
        <h2>Seleccionar Cliente</h2>
        <select id="selectCliente" class="select-input">
          <option value="">Seleccionar</option>
        </select>
        <br />
        <br />
        <input
          type="text"
          id="nombreEditar"
          class="form-input"
          placeholder="Nombre"
        />
        <input
          type="text"
          id="direccionEditar"
          class="form-input"
          placeholder="Direccion|"
        />
        <button id="btnEditar" class="btn btn-update">Editar</button>
        <button id="btnEliminar" class="btn btn-delete">Eliminar</button>
      </div>
      <div class="column view-column">
        <h2>Lista de Clientes</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Direccion</th>
            </tr>
          </thead>
          <tbody id="ClientesList"></tbody>
        </table>
      </div>
    </div>
    <script src="../logica/crud_usuario.js"></script>
  </body>
</html>
