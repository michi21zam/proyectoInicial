<!--
  user.html

  This page renders a simple CRUD interface for managing User records.
  It is composed of three columns:
    1. A form to add a new user.
    2. A dropdown + form to select, edit, or delete an existing user.
    3. A table that lists all current users.

  All dynamic behavior (API calls, DOM updates) is handled by
  "user.js", which is loaded at the end of the body.

  Note: the API still expects/returns the fields "nombre" and "direccion"
  (Spanish field names), so those are mapped internally in user.js even
  though every element ID and visible label here is in English.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User CRUD</title>
    <link rel="stylesheet" href="../estilos/crud_usuario.css" />
  </head>

  <body>
    <!-- Navigation link back to the site's home page. -->
    <div>
      <a href="../index.html" class="home-button">Back to home page</a>
    </div>
    <hr />

    <div class="container">
      <!--
        Column 1: Add User form.
        Contains the input fields and button used to create a new user
        via the "addUser()" function in user.js.
      -->
      <div class="column form-column">
        <h2>Add User</h2>
        <input type="text" id="name" class="form-input" placeholder="name" />
        <input
          type="text"
          id="address"
          class="form-input"
          placeholder="address"
        />
        <button id="addButton" class="btn btn-agregar">Add</button>
      </div>

      <!--
        Column 2: Select / Edit / Delete User.
        The dropdown is populated dynamically by "populateSelect()".
        Selecting a user auto-fills the edit fields below, which are then
        used by "editUser()" and "removeUser()".
      -->
      <div class="column select-column">
        <h2>Select User</h2>
        <select id="selectUser" class="select-input">
          <option value="">Select</option>
        </select>
        <br />
        <br />
        <input
          type="text"
          id="nameEdit"
          class="form-input"
          placeholder="Name"
        />
        <input
          type="text"
          id="addressEdit"
          class="form-input"
          placeholder="Address"
        />
        <button id="editButton" class="btn btn-update">Edit</button>
        <button id="deleteButton" class="btn btn-delete">Delete</button>
      </div>

      <!--
        Column 3: User List.
        The table body ("userList") is populated dynamically by
        "refreshList()" every time the data changes.
      -->
      <div class="column view-column">
        <h2>User List</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Address</th>
            </tr>
          </thead>
          <tbody id="userList"></tbody>
        </table>
      </div>
    </div>

    <!-- Script containing all CRUD logic and event handlers. -->
    <script src="../logica/user.js"></script>
  </body>
</html>
